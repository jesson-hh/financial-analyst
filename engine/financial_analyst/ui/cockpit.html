<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>觀瀾 · 交易盯盘台</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { overflow-x: auto; overflow-y: hidden; }
  #root { min-width: 1200px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hover-row:hover { background: rgba(28,24,20,0.04); }
  .hover-pill:hover { background: rgba(28,24,20,0.06); }
  .hover-link:hover { color: var(--ink) !important; text-decoration: underline; text-underline-offset: 3px; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(28,24,20,0.12); }
  *::-webkit-scrollbar-thumb:hover { background: rgba(28,24,20,0.22); }
  select { appearance: none; -webkit-appearance: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script>
  // 后端地址: ?backend=http://127.0.0.1:9998 可覆盖, 否则默认主装 :9999 (同 quant.html)
  window.GUANLAN_BACKEND =
    new URLSearchParams(location.search).get('backend') || 'http://127.0.0.1:9999';
</script>
<!-- 顺序关键: 先 quant.jsx (定义 window.WatchMode + 全部组件/helper), 再 cockpit.jsx (用 WatchMode 定义 CockpitApp), 最后渲染. -->
<!-- ?v= cache-buster: 改对应 jsx 后 +1, 普通 F5 也拉新版 (http.server 无缓存头). -->
<script type="text/babel" src="quant.jsx?v=20260602-5"></script>
<script type="text/babel" src="cockpit.jsx?v=20260602-4"></script>
<script type="text/babel" data-presets="env,react">
  ReactDOM.createRoot(document.getElementById('root')).render(<CockpitApp />);
</script>
</body>
</html>
