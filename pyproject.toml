[project]
name = "financial-analyst"
version = "0.1.0"
description = "A-share single-stock deep-dive multi-agent research workstation"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
dependencies = [
    "litellm>=1.50",
    "pydantic>=2.5",
    "pydantic-settings>=2.1",
    "typer>=0.12",
    "rich>=13",
    "prompt-toolkit>=3.0",
    "pandas>=2",
    "numpy>=1.26",
    "pyarrow>=15",
    "lightgbm>=4",
    "tushare>=1.4",
    "pyyaml>=6",
    "anyio>=4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "ruff>=0.5",
]

[project.scripts]
financial-analyst = "financial_analyst.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/financial_analyst"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
