<meta charset="utf-8" />
<title>观澜 · 投研对话台</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" />
<link rel="stylesheet" href="../_shared/tokens.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { overflow: hidden; }
  /* 桌面 app 最小宽度: 视口窄于 1200px 时允许横向滚动, 避免 flex 极致压扁 */
  #root { min-width: 1200px; }
  body { overflow-x: auto; overflow-y: hidden; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.4); opacity: 0; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    20% { transform: rotate(-10deg); }
    40% { transform: rotate(10deg); }
    60% { transform: rotate(-6deg); }
    80% { transform: rotate(6deg); }
  }
  @keyframes blink {
    50% { opacity: 0; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hover-row:hover { background: rgba(28,24,20,0.04); }
  .watch-row:hover .watch-del { display: flex !important; }
  .hover-link:hover { color: var(--ink) !important; text-decoration: underline; text-underline-offset: 3px; }
  .hover-pill:hover { background: rgba(28,24,20,0.06); }

  /* scrollbar */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(28,24,20,0.12); }
  *::-webkit-scrollbar-thumb:hover { background: rgba(28,24,20,0.22); }

  /* select reset */
  select { appearance: none; -webkit-appearance: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
