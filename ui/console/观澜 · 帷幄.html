<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" />
<link rel="stylesheet" href="../_shared/tokens.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: var(--sans); color: var(--ink); background: var(--paper); overflow: hidden; }
  #root { min-width: 1280px; height: 100%; }
  .num, .mono { font-variant-numeric: tabular-nums; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: rgba(28,24,20,0.16); border-radius: 4px; }
  *::-webkit-scrollbar-track { background: transparent; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes pulseRing { 0%,100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.4); opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  .hover-row:hover { background: rgba(28,24,20,0.04); }
  .ww-sess-act { opacity: 0; color: var(--ink-3); font-size: 11px; cursor: pointer; transition: opacity .12s; }
  .ww-sess:hover .ww-sess-act { opacity: 1; }
  .ww-sess-act:hover { color: var(--ink); }
  .hover-link:hover { color: var(--ink) !important; text-decoration: underline; text-underline-offset: 3px; }
  .hover-pill:hover { background: rgba(28,24,20,0.06); }
  select { appearance: none; -webkit-appearance: none; }
</style>
