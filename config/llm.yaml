default_provider: deepseek
default_model: deepseek-chat

# 2026-06-01: qwen (DashScope) 已移除 — 用户要求只用 deepseek (qwen domestic 经 Clash fake-ip 接管走海外节点, 接不上).
# anthropic / openai 保留为休眠定义 (本机无 key, 无 agent_overrides 指向, 不会被调用).
providers:
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    network_profile: intl_clash   # Clash fake-ip + MITM, 必经 proxy + verify=False
    models: [deepseek-chat, deepseek-reasoner]
  kimi:
    api_key_env: KIMI_API_KEY
    base_url: https://api.moonshot.cn/v1
    network_profile: domestic    # 国内直连 trust_env=False, 绕开 Clash fake-ip(qwen 前车之鉴, curl 直连已验通)
    models: [kimi-k2.6, kimi-k2.5, moonshot-v1-auto]
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    network_profile: intl_clash   # 走 litellm fallback, 这字段仅占位
    models: [claude-opus-4-7, claude-sonnet-4-6, claude-haiku-4-5]
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    network_profile: intl_clash
    models: [gpt-4o, gpt-4-turbo]

# agent_overrides (2026-06-01 清零后重启用):
# - industry_extract (2026-07-03): AI投研看板研报抽取走 Kimi k2.6 (256K ctx, 用户指定读研报模型).
# - 思考档位 (2026-07-12 思考预算层): deep=deepseek-reasoner+max_tokens+长超时(判断密集型缝),
#   fast=deepseek-chat(填表型缝, 默认). 真机探针(2026-07-12): reasoner 别名支持
#   json_object/tools/max_tokens/per-request timeout 且返回 reasoning_content;
#   models.list()=[deepseek-v4-flash, deepseek-v4-pro], 别名可用.
#   其余 agent 仍走 default_provider (deepseek/deepseek-chat).
# - 研报辩护/风控/写手 deep 档 (2026-07-12): bull/bear-advocate 逐条交锋 + risk-officer
#   综合裁决 + report-writer 终稿成文, 四座席判断密集型, 升 reasoner (座席名经
#   LLMClient.for_agent(self.NAME) 实测, 见 tier3/*.py); advocates 内容重试
#   temperature=0.3+attempt*0.2 对 reasoner 无害 (温度参数照单收, 真机已验).
agent_overrides:
  industry_extract: {provider: kimi, model: kimi-k2.6}
  rerank:           {provider: deepseek, model: deepseek-reasoner, max_tokens: 8192, timeout: 300}
  review_officer:   {provider: deepseek, model: deepseek-reasoner, max_tokens: 8192, timeout: 300}
  review_section:   {provider: deepseek, model: deepseek-chat}
  bull-advocate:    {provider: deepseek, model: deepseek-reasoner, max_tokens: 8192, timeout: 300}
  bear-advocate:    {provider: deepseek, model: deepseek-reasoner, max_tokens: 8192, timeout: 300}
  risk-officer:     {provider: deepseek, model: deepseek-reasoner, max_tokens: 8192, timeout: 300}
  report-writer:    {provider: deepseek, model: deepseek-reasoner, max_tokens: 8192, timeout: 300}
